<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 25px;
            color: white;
        }

        .logo {
            width: 120px;
        }

        /* CONTAINER */
        .container {
            display: flex;
            padding: 30px;
            gap: 20px;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        .left {
            width: 30%;
            text-align: center;
        }

        .right {
            width: 70%;
        }

        /* 🔥 PROFILE IMAGE (HEAD TO CHEST FIX) */
        .profile-container {
            width: 180px;
            height: 220px;
            margin: auto;
            overflow: hidden;
            border-radius: 20px;
            border: 4px solid #4facfe;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        .profile {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top; /* 🔥 shows head properly */
        }

        /* INPUT GRID */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        /* 🔥 COLORED INPUT BOXES */
        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
        }

        input:nth-child(1) { background: #ffdde1; }
        input:nth-child(2) { background: #c2ffd8; }
        input:nth-child(3) { background: #cfd9ff; }
        input:nth-child(4) { background: #ffe0b2; }
        input:nth-child(5) { background: #d1c4e9; }
        input:nth-child(6) { background: #b2ebf2; }
        input:nth-child(7) { background: #f8bbd0; }
        input:nth-child(8) { background: #dcedc8; }
        input:nth-child(9) { background: #fff9c4; }
        input:nth-child(10){ background: #ffccbc; }
        input:nth-child(11){ background: #b3e5fc; }
        input:nth-child(12){ background: #e1bee7; }
        input:nth-child(13){ background: #c8e6c9; }
        input:nth-child(14){ background: #ffcdd2; }

        /* BUTTON */
        .btn {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: white;
            border: none;
            padding: 12px;
            margin-top: 15px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        /* PREDICTION */
        .prediction {
            margin-top: 20px;
            padding: 15px;
            background: #e6fff2;
            border-left: 5px solid green;
            border-radius: 8px;
            font-size: 20px;
            color: green;
        }

    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <img src="{{ url_for('static', filename='skill.png') }}" class="logo">
        <h1>🏢 Skill Union pvt.Limited</h1>
        <p>✨ House Price Prediction using Machine Learning</p>
    </div>

    <div class="container">

        <!-- LEFT -->
        <div class="card left">

            <!-- 🔥 PROFILE IMAGE FIXED -->
            <div class="profile-container">
                <img src="{{ url_for('static', filename='1777875666648.jpg') }}" class="profile">
            </div>

            <h2>👩‍💻 Sharath kanchipati</h2>
            <p><b>Data Analyst & ML Engineer</b></p>
            <p>Email: ksk111000@gmail.com</p>
            <p> phone number: 8099413353</p>

        </div>

        <!-- RIGHT -->
        <div class="card right">

            <h2>🏠 Enter House Details</h2>

            <form action="/predict" method="post">

                <div class="form-grid">
                    <input type="text" name="bedrooms" placeholder="Bedrooms">
                    <input type="text" name="bathrooms" placeholder="Bathrooms">
                    <input type="text" name="sqft_living" placeholder="Sqft Living">
                    <input type="text" name="sqft_lot" placeholder="Sqft Lot">
                    <input type="text" name="floors" placeholder="Floors">
                    <input type="text" name="waterfront" placeholder="Waterfront">
                    <input type="text" name="view" placeholder="View">
                    <input type="text" name="condition" placeholder="Condition">
                    <input type="text" name="sqft_above" placeholder="Sqft Above">
                    <input type="text" name="sqft_basement" placeholder="Sqft Basement">
                    <input type="text" name="yr_built" placeholder="Year Built">
                    <input type="text" name="yr_renovated" placeholder="Year Renovated">
                    <input type="text" name="city" placeholder="City (0-43)">
                    <input type="text" name="country" placeholder="Country (0)">
                </div>

                <button class="btn">🚀 Predict Price</button>

            </form>

            {% if prediction_text %}
            <div class="prediction">
                {{ prediction_text }}
            </div>
            {% endif %}

        </div>

    </div>

</body>
</html>
